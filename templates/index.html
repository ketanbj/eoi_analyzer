<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>EOI Analyzer - Upload</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <style>
      body {
        background-color: #f8f9fa;
      }
      .container {
        margin-top: 50px;
      }
      #loading {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        text-align: center;
        padding-top: 20%;
        font-size: 24px;
      }
    </style>
    <script>
      function showLoading() {
        document.getElementById("loading").style.display = "block";
      }
    </script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <a class="navbar-brand" href="#">EOI Analyzer</a>
    </nav>
    <div class="container">
      <div class="card shadow">
        <div class="card-header">
          <h3 class="card-title mb-0">Upload Your PDF</h3>
        </div>
        <div class="card-body">
          <form method="post" enctype="multipart/form-data" onsubmit="showLoading()">
            <div class="form-group">
              <label for="file">Select Expression of Interest PDF</label>
              <input type="file" class="form-control-file" id="file" name="file" accept=".pdf" required>
            </div>
            <button type="submit" class="btn btn-primary">Analyze</button>
          </form>
        </div>
      </div>
    </div>
    <div id="loading">Processing your file, please wait...</div>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
